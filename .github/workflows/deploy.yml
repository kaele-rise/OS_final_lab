name: Ansible CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Create vault password file
        run: echo "${{ secrets.VAULT_PASS }}" > vault_pass.txt

      - name: Setup ansible.cfg
        run: |
          echo '[defaults]' > ansible.cfg
          echo 'roles_path = ./roles' >> ansible.cfg
          echo 'vault_password_file = vault_pass.txt' >> ansible.cfg
          echo 'host_key_checking = False' >> ansible.cfg

      - name: Install collection
        run: ansible-galaxy collection install community.postgresql

      - name: Syntax check
        run: ansible-playbook playbooks/site.yml --syntax-check

      - name: List tasks
        run: ansible-playbook playbooks/site.yml --list-tasks
