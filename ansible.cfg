[defaults]
inventory = inventories/dynamic_inventory.py
host_key_checking = False
retry_files_enabled = False
vault_password_file = vault_pass.txt
remote_user = root
private_key_file = ~/.vagrant.d/insecure_private_key
filter_plugins = /home/timuuu/ansible-lab/filter_plugins
roles_path = /home/timuuu/ansible-lab/roles

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=password -o PubkeyAuthentication=no
