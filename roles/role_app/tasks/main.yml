---
- name: Install Python and pip
  apt:
    name: "{{ item }}"
    state: present
    update_cache: yes
  loop:
    - python3
    - python3-pip
  tags:
    - install
    - app

- name: Install Flask and requests
  pip:
    name:
      - flask
      - requests
    state: present
  tags:
    - install
    - app

- name: Create app directory
  file:
    path: /opt/{{ app_name }}
    state: directory
    mode: '0755'

- name: Copy application code
  copy:
    src: app.py
    dest: /opt/{{ app_name }}/app.py
    mode: '0755'

- name: Generate app config from template
  template:
    src: app_config.j2
    dest: /opt/{{ app_name }}/config.py
  notify: restart app
  tags:
    - config
    - app

- name: Create systemd service
  template:
    src: app.service.j2
    dest: /etc/systemd/system/{{ app_name }}.service
  notify: restart app

- name: Start and enable app
  systemd:
    name: "{{ app_name }}"
    state: started
    enabled: yes
    daemon_reload: yes
  tags:
    - restart
    - app
