---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: yes
  tags:
    - install
    - web

- name: Copy nginx config from template
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
    owner: root
    group: root
    mode: '0644'
  notify: restart nginx
  tags:
    - config
    - web

- name: Enable site
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: restart nginx
  tags:
    - config
    - web
